<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hange Zhou | Personal Website</title>
    <meta
      name="description"
      content="Hange Zhou's personal website, focusing on Agentic Reasoning, Data Augmentation, VLA, and multimodal intelligent systems."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-lang="en">
    <canvas id="particles" aria-hidden="true"></canvas>
    <div class="noise" aria-hidden="true"></div>

    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="#top">
          <span class="brand-mark"></span>
          <span class="brand-text">Hange Zhou</span>
        </a>
        <nav class="nav-links">
          <a href="#about" data-i18n="nav.about"></a>
          <a href="#publications" data-i18n="nav.publications"></a>
          <a href="#projects" data-i18n="nav.projects"></a>
          <a href="#awards" data-i18n="nav.awards"></a>
          <a href="#timeline" data-i18n="nav.timeline"></a>
        </nav>
        <button id="lang-toggle" class="lang-toggle" type="button">EN</button>
      </div>
    </header>

    <main id="top">
      <section class="hero section">
        <div class="container hero-grid">
          <div class="hero-copy reveal">
            <p class="eyebrow" data-i18n="hero.eyebrow"></p>
            <h1 data-i18n="hero.title"></h1>
            <p class="hero-subtitle" data-i18n="hero.subtitle"></p>
            <p class="hero-description" data-i18n="hero.description"></p>
            <div class="hero-actions">
              <a
                class="button button-primary"
                href="https://github.com/HangerAmber"
                target="_blank"
                rel="noreferrer"
                data-i18n="hero.github"
              ></a>
              <a class="button button-secondary" href="#publications" data-i18n="hero.papers"></a>
            </div>
            <div id="stats-grid" class="stats-grid"></div>
          </div>

          <div class="hero-portrait reveal">
            <div class="portrait-card">
              <div class="portrait-glow"></div>
              <div class="portrait-frame">
                <div class="portrait-photo-shell">
                  <img
                    class="portrait-photo"
                    src="assets/20260408-134508.jpg"
                    alt="Portrait of Hange Zhou"
                  />
                  <div class="portrait-caption">
                    <p data-i18n="hero.photoPlaceholder"></p>
                    <span data-i18n="hero.photoHint"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="about" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="about.kicker"></span>
            <h2 data-i18n="about.title"></h2>
          </div>
          <div class="about-grid">
            <article class="panel reveal">
              <div id="bio-list" class="bio-list"></div>
            </article>
            <article class="panel reveal">
              <h3 data-i18n="about.researchTitle"></h3>
              <div id="research-tags" class="tag-list"></div>
              <p class="panel-note" data-i18n="about.researchNote"></p>
            </article>
          </div>
        </div>
      </section>

      <section id="publications" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="publications.kicker"></span>
            <h2 data-i18n="publications.title"></h2>
          </div>
          <div id="publications-list" class="stack-list"></div>
        </div>
      </section>

      <section id="patents" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="patents.kicker"></span>
            <h2 data-i18n="patents.title"></h2>
          </div>
          <div id="patents-grid" class="card-grid"></div>
        </div>
      </section>

      <section id="projects" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="projects.kicker"></span>
            <h2 data-i18n="projects.title"></h2>
          </div>
          <div id="projects-grid" class="card-grid"></div>
        </div>
      </section>

      <section id="awards" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="awards.kicker"></span>
            <h2 data-i18n="awards.title"></h2>
          </div>
          <p class="section-note reveal" data-i18n="awards.note"></p>
          <div id="awards-grid" class="awards-grid"></div>
        </div>
      </section>

      <section id="news" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="news.kicker"></span>
            <h2 data-i18n="news.title"></h2>
          </div>
          <div id="news-list" class="timeline-list"></div>
        </div>
      </section>

      <section id="timeline" class="section">
        <div class="container">
          <div class="section-heading reveal">
            <span class="section-kicker" data-i18n="timeline.kicker"></span>
            <h2 data-i18n="timeline.title"></h2>
          </div>
          <p class="section-note reveal" data-i18n="timeline.note"></p>
          <div id="timeline-list" class="timeline-list"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>
          <p class="footer-name">Hange Zhou</p>
          <p data-i18n="footer.copy"></p>
        </div>
        <a
          class="footer-link"
          href="https://github.com/HangerAmber"
          target="_blank"
          rel="noreferrer"
        >
          GitHub
        </a>
      </div>
    </footer>

    <div id="image-lightbox" class="lightbox" aria-hidden="true">
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close preview">
        ×
      </button>
      <div class="lightbox-backdrop" data-lightbox-close="true"></div>
      <div class="lightbox-content">
        <img id="lightbox-image" class="lightbox-image" src="" alt="" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
